apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: lostandfound-sensorhub
  name: lostandfound-sensorhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lostandfound-sensorhub
  strategy:
    activeDeadlineSeconds: 21600
    resources: {}
    rollingParams:
      intervalSeconds: 1
      maxSurge: 25%
      maxUnavailable: 25%
      timeoutSeconds: 600
      updatePeriodSeconds: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: lostandfound-sensorhub
        deploymentconfig: lostandfound-sensorhub
    spec:
      volumes:
      - name: sensorhub-config
        configMap:
          name: sensorhub-configmap
          defaultmode: 400
      containers:
      - image: docker.io/mioja/sensorhub-nginx:latest
        imagePullPolicy: Always
        name: nginx
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: HOSTNAME
          value: lostandfound-pwp-2026.2.rahtiapp.fi
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      - image: docker.io/mioja/sensorhub:latest
        imagePullPolicy: Always
        name: sensorhub
        ports:
        - containerPort: 8000
          protocol: TCP
        volumeMounts:
        - name: sensorhub-config
          readOnly: true
          mountPath: /opt/sensorhub/instance/config/
        env:
        - name: FLASK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: lostandfound-secret
              key: SECRET_KEY
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: lostandfound-secret
              key: DB_USER
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: lostandfound-secret
              key: DB_NAME
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: lostandfound-secret
              key: DB_HOST
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: lostandfound-secret
              key: DB_PASS
        resources:
          limits:
            cpu: 1500m
            memory: 7Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
  test: false
